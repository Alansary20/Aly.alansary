<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>نظام الجرد الذكي | ترتيب تنازلي وتأخير</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d0f14;
            --surface: #13161e;
            --surface2: #1a1e2a;
            --surface3: #222736;
            --border: rgba(255,255,255,0.07);
            --border-glow: rgba(0,212,170,0.3);
            --accent: #00d4aa;
            --accent2: #0096ff;
            --accent3: #ff6b6b;
            --accent-glow: rgba(0,212,170,0.15);
            --text: #e8edf5;
            --text-muted: #6b7a9a;
            --text-dim: #3d4a63;
            --gold: #ffd166;
            --positive: #00d4aa;
            --negative: #ff6b6b;
            --neutral: #0096ff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Cairo', 'Tajawal', sans-serif;
            background: var(--bg);
            color: var(--text);
            direction: rtl;
            padding: 16px 14px 60px;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* Background grid pattern */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(0,212,170,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,212,170,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            top: -30%;
            right: -20%;
            width: 60vw;
            height: 60vw;
            background: radial-gradient(circle, rgba(0,212,170,0.06) 0%, transparent 65%);
            pointer-events: none;
            z-index: 0;
        }

        .app-container {
            max-width: 580px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        /* ── HEADER ── */
        .header {
            background: linear-gradient(135deg, #0d1f2d 0%, #0a1628 50%, #0d1f2d 100%);
            border-radius: 24px;
            padding: 22px 20px 18px;
            margin-bottom: 18px;
            color: white;
            border: 1px solid rgba(0,212,170,0.2);
            box-shadow: 0 0 40px rgba(0,212,170,0.08), 0 20px 40px rgba(0,0,0,0.4);
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent), var(--accent2), transparent);
        }

        .header h1 {
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-weight: 900;
            letter-spacing: -0.5px;
            font-family: 'Tajawal', sans-serif;
        }

        .header h1 i {
            color: var(--accent);
            filter: drop-shadow(0 0 8px var(--accent));
        }

        .header-subtitle {
            text-align: center;
            font-size: 0.72rem;
            color: rgba(255,255,255,0.4);
            margin-top: 4px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Header buttons */
        .header > div button {
            background: rgba(0,212,170,0.1) !important;
            border: 1px solid rgba(0,212,170,0.25) !important;
            color: var(--accent) !important;
            font-family: 'Cairo', sans-serif;
            font-size: 0.78rem;
            backdrop-filter: blur(10px);
            transition: all 0.2s ease;
        }
        .header > div button:hover {
            background: rgba(0,212,170,0.2) !important;
            box-shadow: 0 0 16px rgba(0,212,170,0.2);
        }

        /* ── STATS ── */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 16px;
        }

        .stat-card {
            background: var(--surface);
            border-radius: 16px;
            padding: 16px 8px 12px;
            text-align: center;
            border: 1px solid var(--border);
            position: relative;
            overflow: hidden;
            transition: transform 0.2s, border-color 0.2s;
        }

        .stat-card:hover {
            transform: translateY(-2px);
            border-color: rgba(0,212,170,0.3);
        }

        .stat-card::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--accent2), var(--accent));
            opacity: 0.5;
        }

        .stat-number {
            font-size: 2rem;
            font-weight: 900;
            color: var(--accent);
            font-family: 'Tajawal', sans-serif;
            line-height: 1;
            text-shadow: 0 0 20px rgba(0,212,170,0.4);
        }

        .stat-label {
            font-size: 0.65rem;
            color: var(--text-muted);
            font-weight: 600;
            margin-top: 5px;
            letter-spacing: 0.5px;
        }

        /* ── TABS ── */
        .tabs {
            display: flex;
            background: var(--surface);
            border-radius: 14px;
            padding: 4px;
            margin-bottom: 16px;
            gap: 3px;
            border: 1px solid var(--border);
        }

        .tab-btn {
            flex: 1;
            background: transparent;
            border: none;
            padding: 10px 4px;
            border-radius: 10px;
            font-weight: 700;
            font-size: 0.68rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            cursor: pointer;
            color: var(--text-muted);
            transition: all 0.2s ease;
            font-family: 'Cairo', sans-serif;
        }

        .tab-btn i { font-size: 0.75rem; }

        .tab-btn:hover { color: var(--text); }

        .tab-btn.active {
            background: linear-gradient(135deg, rgba(0,212,170,0.15), rgba(0,150,255,0.1));
            color: var(--accent);
            border: 1px solid rgba(0,212,170,0.25);
            box-shadow: 0 2px 12px rgba(0,212,170,0.1);
        }

        /* ── CARD ── */
        .card {
            background: var(--surface);
            border-radius: 20px;
            padding: 18px 16px;
            margin-bottom: 16px;
            border: 1px solid var(--border);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        /* ── PANEL ── */
        .panel { display: none; animation: fadeIn 0.25s ease; }
        .panel.active-pane { display: block; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ── INPUTS ── */
        .input-field {
            width: 100%;
            padding: 13px 18px;
            font-size: 0.95rem;
            border: 1px solid var(--border);
            border-radius: 12px;
            background: var(--surface2);
            margin-bottom: 12px;
            color: var(--text);
            font-family: 'Cairo', sans-serif;
            transition: all 0.2s;
        }
        .input-field::placeholder { color: var(--text-dim); }
        .input-field:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(0,212,170,0.12);
            background: var(--surface3);
        }

        /* ── BUTTONS ── */
        .btn-primary, .btn-secondary {
            border: none;
            padding: 13px 18px;
            border-radius: 12px;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
            width: 100%;
            transition: all 0.15s ease;
            font-family: 'Cairo', sans-serif;
            font-size: 0.88rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, #00b894, #00d4aa);
            color: #021a14;
            font-weight: 800;
            box-shadow: 0 4px 20px rgba(0,212,170,0.3);
        }
        .btn-primary:hover { box-shadow: 0 6px 28px rgba(0,212,170,0.45); transform: translateY(-1px); }
        .btn-primary:active { transform: translateY(1px); box-shadow: 0 2px 10px rgba(0,212,170,0.2); }

        .btn-secondary {
            background: var(--surface2);
            color: var(--text);
            border: 1px solid var(--border);
        }
        .btn-secondary:hover { border-color: rgba(0,212,170,0.3); color: var(--accent); }

        /* ── FLEX 2 COLS ── */
        .flex-2cols { display: flex; gap: 10px; margin: 10px 0; }
        .flex-2cols .btn { width: auto; flex: 1; }

        /* ── INVENTORY LIST ── */
        .inventory-list { max-height: 520px; overflow-y: auto; scrollbar-width: thin; scrollbar-color: var(--surface3) transparent; }

        .product-card {
            background: var(--surface2);
            border-radius: 14px;
            padding: 14px;
            margin-bottom: 10px;
            border: 1px solid var(--border);
            transition: border-color 0.2s;
        }
        .product-card:hover { border-color: rgba(0,212,170,0.2); }

        .product-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }

        .product-info strong { font-size: 0.9rem; font-weight: 700; }
        .product-info small { color: var(--text-muted); font-size: 0.7rem; }

        .product-quantity {
            font-size: 1.6rem;
            font-weight: 900;
            color: var(--accent);
            background: rgba(0,212,170,0.1);
            padding: 4px 16px;
            border-radius: 10px;
            border: 1px solid rgba(0,212,170,0.2);
            font-family: 'Tajawal', sans-serif;
            text-shadow: 0 0 12px rgba(0,212,170,0.4);
        }

        .product-time {
            font-size: 0.62rem;
            color: var(--text-dim);
            margin-top: 3px;
        }

        .product-actions { margin-top: 10px; display: flex; gap: 6px; flex-wrap: wrap; }

        .icon-btn {
            background: var(--surface3);
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 0.7rem;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
            transition: all 0.15s;
        }
        .icon-btn:hover { color: var(--accent); border-color: rgba(0,212,170,0.3); }

        /* ── TABLES ── */
        .data-wrapper {
            overflow-x: auto;
            border-radius: 14px;
            border: 1px solid var(--border);
            background: var(--surface2);
            margin-top: 12px;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.78rem;
            min-width: 380px;
        }

        .data-table th {
            background: var(--surface3);
            color: var(--text-muted);
            font-weight: 700;
            padding: 12px 10px;
            text-align: center;
            font-size: 0.72rem;
            letter-spacing: 0.5px;
            border-bottom: 1px solid var(--border);
        }

        .data-table td {
            padding: 11px 10px;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.04);
            color: var(--text);
        }

        .data-table tbody tr:hover { background: rgba(255,255,255,0.03); }

        .diff-positive { background: rgba(0,212,170,0.12); color: var(--positive); font-weight: 700; }
        .diff-negative { background: rgba(255,107,107,0.12); color: var(--negative); font-weight: 700; }
        .diff-zero { background: rgba(0,150,255,0.1); color: var(--neutral); font-weight: 700; }

        /* ── SEARCH ── */
        .search-input {
            width: 100%;
            padding: 11px 16px;
            border-radius: 12px;
            border: 1px solid var(--border);
            margin-bottom: 12px;
            background: var(--surface2);
            color: var(--text);
            font-family: 'Cairo', sans-serif;
            font-size: 0.88rem;
        }
        .search-input::placeholder { color: var(--text-dim); }
        .search-input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,212,170,0.1); }

        /* ── FILE UPLOAD ── */
        .file-label {
            background: var(--surface2);
            border-radius: 12px;
            padding: 14px;
            text-align: center;
            cursor: pointer;
            border: 1px dashed rgba(0,212,170,0.3);
            margin-bottom: 14px;
            color: var(--text-muted);
            font-size: 0.9rem;
            transition: all 0.2s;
        }
        .file-label:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: rgba(0,212,170,0.05);
        }

        /* ── CAMERA ── */
        .camera-wrapper {
            border-radius: 16px;
            overflow: hidden;
            margin-top: 12px;
            background: #000;
            position: relative;
            max-width: 400px;
            margin-left: auto;
            margin-right: auto;
            border: 1px solid rgba(0,212,170,0.2);
        }

        .camera-selector {
            display: flex;
            gap: 8px;
            margin: 12px 0;
            align-items: center;
            flex-wrap: wrap;
        }

        .cam-select {
            flex: 2;
            padding: 10px 14px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--surface2);
            color: var(--text);
            font-family: 'Cairo', sans-serif;
        }

        /* ── COMPARE STATS ── */
        .compare-stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 16px;
        }

        .compare-stat-card {
            background: var(--surface2);
            border-radius: 12px;
            padding: 12px 6px;
            text-align: center;
            border: 1px solid var(--border);
            transition: border-color 0.2s;
        }
        .compare-stat-card:hover { border-color: rgba(0,212,170,0.25); }

        .compare-stat-number {
            font-size: 1.4rem;
            font-weight: 900;
            color: var(--accent);
            font-family: 'Tajawal', sans-serif;
        }

        .compare-stat-label {
            font-size: 0.62rem;
            color: var(--text-muted);
            margin-top: 3px;
        }

        /* ── FILTER BTNS ── */
        .filter-btn {
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 7px 14px;
            border-radius: 8px;
            font-size: 0.78rem;
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
            transition: all 0.15s;
        }
        .filter-btn.active {
            background: rgba(0,212,170,0.15);
            border-color: rgba(0,212,170,0.35);
            color: var(--accent);
        }

        /* ── TOAST ── */
        .toast {
            position: fixed;
            bottom: 24px;
            left: 16px;
            right: 16px;
            background: var(--surface3);
            color: var(--text);
            text-align: center;
            padding: 13px 20px;
            border-radius: 14px;
            font-size: 0.85rem;
            z-index: 2100;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            border: 1px solid rgba(0,212,170,0.2);
            font-family: 'Cairo', sans-serif;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ── FLASH EFFECTS ── */
        .flash-green {
            border-color: var(--accent) !important;
            box-shadow: 0 0 0 3px rgba(0,212,170,0.3) !important;
            background: rgba(0,212,170,0.08) !important;
            transition: 0.08s;
        }
        .flash-red {
            border-color: var(--negative) !important;
            box-shadow: 0 0 0 3px rgba(255,107,107,0.3) !important;
            background: rgba(255,107,107,0.06) !important;
            transition: 0.08s;
        }

        /* ── MODAL ── */
        #productModal > div {
            background: var(--surface) !important;
            border: 1px solid rgba(0,212,170,0.2) !important;
            color: var(--text) !important;
        }
        #productModal h3 { color: var(--accent); margin-bottom: 16px; font-family: 'Tajawal', sans-serif; }
        #productModal input {
            display: block;
            width: 100%;
            padding: 11px 14px;
            margin-bottom: 10px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-family: 'Cairo', sans-serif;
        }
        #productModal input:focus { outline: none; border-color: var(--accent); }
        #productModal input::placeholder { color: var(--text-dim); }
        #saveProductBtn {
            background: linear-gradient(135deg, #00b894, #00d4aa) !important;
            color: #021a14 !important;
            font-weight: 800 !important;
            font-family: 'Cairo', sans-serif;
        }
        #closeModalBtn {
            background: var(--surface2) !important;
            color: var(--text) !important;
            border: 1px solid var(--border) !important;
            font-family: 'Cairo', sans-serif;
        }

        /* ── INVENTORY COUNT BADGE ── */
        #inventoryCount {
            background: rgba(0,212,170,0.15) !important;
            color: var(--accent) !important;
            border: 1px solid rgba(0,212,170,0.3) !important;
            font-family: 'Tajawal', sans-serif;
        }

        /* ── SECTION HEADINGS ── */
        h4 { color: var(--text-muted); font-size: 0.85rem; font-weight: 700; }

        /* ── SELECT DROPDOWNS ── */
        select {
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text);
            font-family: 'Cairo', sans-serif;
        }

        /* ── MISC ── */
        .hidden { display: none; }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 10px; }

        /* خط مسح الكاميرا المتحرك */
        @keyframes scanAnim {
            0%   { top: 20%; opacity: 0.6; }
            50%  { top: 80%; opacity: 1;   }
            100% { top: 20%; opacity: 0.6; }
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="header">
        <h1><i class="fas fa-cube"></i> نظام الجرد الذكي</h1>
        <div class="header-subtitle">SMART INVENTORY SYSTEM</div>
        <div style="display: flex; justify-content: center; gap: 10px; margin-top: 14px;">
            <button id="globalResetBtn" style="border: none; padding: 7px 16px; border-radius: 10px; font-weight: 700; cursor: pointer; font-size: 0.8rem;"><i class="fas fa-sync-alt"></i> إعادة تعيين</button>
            <button id="globalManualBtn" style="border: none; padding: 7px 16px; border-radius: 10px; font-weight: 700; cursor: pointer; font-size: 0.8rem;"><i class="fas fa-plus-circle"></i> إضافة منتج</button>
        </div>
    </div>
    <div class="stats-row">
        <div class="stat-card"><div class="stat-number" id="totalProductsStat">0</div><div class="stat-label">إجمالي المنتجات</div></div>
        <div class="stat-card"><div class="stat-number" id="totalInventoryStat">0</div><div class="stat-label">أصناف مجرودة</div></div>
        <div class="stat-card"><div class="stat-number" id="sessionScansStat">0</div><div class="stat-label">عمليات الجرد</div></div>
    </div>
    <div class="tabs">
        <button class="tab-btn active" data-tab="tab-scan"><i class="fas fa-camera"></i> المسح</button>
        <button class="tab-btn" data-tab="tab-inv"><i class="fas fa-clipboard-list"></i> الجرد</button>
        <button class="tab-btn" data-tab="tab-stock"><i class="fas fa-database"></i> المرجع</button>
        <button class="tab-btn" data-tab="tab-cmp"><i class="fas fa-chart-line"></i> المقارنة</button>
        <button class="tab-btn" data-tab="tab-products"><i class="fas fa-archive"></i> المنتجات</button>
    </div>
    <div id="tab-scan" class="panel active-pane">
        <div class="card" id="scanCard">

            <!-- مؤشر حالة السكانر -->
            <div id="scanStatusBar" style="display:flex; align-items:center; gap:10px; padding:10px 14px; border-radius:12px; background:var(--surface2); border:1px solid var(--border); margin-bottom:14px;">
                <div id="scanDot" style="width:10px; height:10px; border-radius:50%; background:var(--text-dim); flex-shrink:0; transition:background 0.3s;"></div>
                <span id="scanStatusText" style="font-size:0.8rem; color:var(--text-muted); flex:1;">جاهز للمسح</span>
                <span id="scanCooldownBadge" style="display:none; font-size:0.72rem; background:rgba(255,107,107,0.15); color:var(--negative); padding:3px 10px; border-radius:6px; border:1px solid rgba(255,107,107,0.2);">⏳ انتظر...</span>
            </div>

            <!-- حقل الإدخال اليدوي -->
            <div style="position:relative; margin-bottom:12px;">
                <input type="text" id="barcodeInput" class="input-field" style="margin-bottom:0; padding-left:48px;" placeholder="✍️ اكتب باركود أو رقم صنف ثم Enter" autocomplete="off" inputmode="text">
                <button id="addOneBtn" style="position:absolute; left:6px; top:50%; transform:translateY(-50%); background:var(--accent); border:none; width:36px; height:36px; border-radius:8px; color:#021a14; font-size:1rem; cursor:pointer; display:flex; align-items:center; justify-content:center;">
                    <i class="fas fa-plus"></i>
                </button>
            </div>

            <!-- كاميرا: اختيار + أزرار -->
            <div style="display:flex; gap:8px; margin-bottom:10px; align-items:center; flex-wrap:wrap;">
                <select id="cameraSelect" class="cam-select" style="flex:2; min-width:0;"><option value="">تحميل الكاميرات...</option></select>

    <!-- باقي التبويبات -->
    <div id="tab-inv" class="panel"><div class="card"><input type="text" id="searchInventory" class="search-input" placeholder="🔍 بحث في سجل الجرد"><button id="exportInventoryBtn" class="btn-secondary"><i class="fas fa-file-excel"></i> تصدير Excel</button><div id="inventoryFullTable" class="data-wrapper"></div></div></div>

<script>
    let db;
    const DB_NAME = "InvSmartDB_Timed";
    const DB_VERSION = 1;
    let inventory = [];
    let html5QrScanner = null;
    let scanningActive = false;
    let availableCameras = [];
    let currentCameraId = null;
    let lastScanTime = 0;
    let lastScannedCode = null;      // لمنع تكرار نفس الباركود فوراً
    let scanDelay = 1500;            // التأخير الافتراضي بين المسحات (ms)
    let audioCtx = null;
    let isScanLocked = false;        // قفل أثناء معالجة المسح

    // ── ضبط التأخير بالـ slider ──
    document.getElementById('delaySlider').addEventListener('input', function() {
        scanDelay = parseInt(this.value);
        const sec = (scanDelay / 1000).toFixed(1);
        document.getElementById('delayLabel').textContent = sec + 's';
        // إعادة ضبط lastScanTime لتطبيق التغيير فوراً
        lastScanTime = 0;
    });

    // ── حالة السكانر ──
    function setScanStatus(state, msg) {
        const dot  = document.getElementById('scanDot');
        const text = document.getElementById('scanStatusText');
        const badge = document.getElementById('scanCooldownBadge');
        if (!dot || !text) return;
        const colors = { idle:'var(--text-dim)', ready:'var(--accent)', scanning:'#ffd166', locked:'var(--negative)' };
        dot.style.background = colors[state] || colors.idle;
        text.textContent = msg || 'جاهز للمسح';
        badge.style.display = (state === 'locked') ? 'inline-block' : 'none';
    }

    // ── الصوت المحسّن ──
    function initAudio() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
    }
    function playBeep(success) {
        if (!audioCtx) initAudio();
        try {
            const now = audioCtx.currentTime;
            if (success) {
                // نغمتان صاعدتان قصيرتان
                [880, 1100].forEach((freq, i) => {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.connect(gain); gain.connect(audioCtx.destination);
                    const t = now + i * 0.12;
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(freq, t);
                    gain.gain.setValueAtTime(0.22, t);
                    gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.18);
                    osc.start(t); osc.stop(t + 0.18);
                });
            } else {
                // نغمة هابطة للخطأ
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(320, now);
                osc.frequency.exponentialRampToValueAtTime(140, now + 0.35);
                gain.gain.setValueAtTime(0.18, now);
                gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.4);
                osc.start(now); osc.stop(now + 0.4);
            }
        } catch(e) {}
    }
    function flashCard(color) {
        const card = document.getElementById('scanCard');
        if (!card) return;
        card.classList.remove('flash-green', 'flash-red');
        void card.offsetWidth; // reflow لإعادة تشغيل الأنيميشن
        card.classList.add(color === 'green' ? 'flash-green' : 'flash-red');
        setTimeout(() => card.classList.remove('flash-green', 'flash-red'), 500);
    }
    function showToast(msg, isErr = false, duration = 3000) {
        let t = document.querySelector('.toast'); if (t) t.remove();
        const toast = document.createElement('div'); toast.className = 'toast';
        toast.style.background = isErr ? 'rgba(255,107,107,0.15)' : 'rgba(0,212,170,0.12)';
        toast.style.border = isErr ? '1px solid rgba(255,107,107,0.3)' : '1px solid rgba(0,212,170,0.3)';
        toast.style.color = isErr ? 'var(--negative)' : 'var(--accent)';
        toast.innerHTML = `<i class="fas ${isErr ? 'fa-exclamation-triangle' : 'fa-check-circle'}"></i> ${msg}`;
        document.body.appendChild(toast);
        setTimeout(() => { toast.style.opacity='0'; toast.style.transition='opacity 0.3s'; setTimeout(()=>toast.remove(),300); }, duration);
    }
    function escapeHtml(str) { return String(str).replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;'); }
    function generateUniqueId() { return Date.now() + '-' + Math.random().toString(36).substr(2, 9) + '-' + performance.now(); }

    // دوال الملفات كما هي
    function readExcelFile(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = new Uint8Array(e.target.result);
                    const wb = XLSX.read(data, { type: 'array' });
                    const sheet = wb.Sheets[wb.SheetNames[0]];
                    const rows = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: "", blankrows: false });
                    resolve(rows);
                } catch (err) { reject(err); }
            };
            reader.onerror = () => reject(new Error("فشل القراءة"));
            reader.readAsArrayBuffer(file);
        });
    }
    function getCommonBlacklist(rows) {
        const counts = new Map();
        for (let i = 0; i < Math.min(rows.length, 100); i++) {
            const row = rows[i]; if (!Array.isArray(row)) continue;
            for (let cell of row) { let v = String(cell || '').trim(); if (v) counts.set(v, (counts.get(v) || 0) + 1); }
        }
        const black = []; for (let [txt, c] of counts.entries()) if (c > 15) black.push(txt);
        return black;
    }
    function parseProductRow(row, blacklist) {
        let res = { barcode: "", item_no: "", name: "" };
        if (!Array.isArray(row)) return res;
        let candidates = { long: [], dash: [], text: [] };
        for (let cell of row) {
            let v = String(cell || '').trim();
            if (!v || blacklist.includes(v)) continue;
            if (/^\d+\.0+$/.test(v)) v = v.replace(/\.0+$/, '');
            let digits = v.replace(/[^\d]/g, '');
            if (digits.length >= 8 && digits.length <= 20) candidates.long.push(v);
            if (v.includes('-') && v.length > 8) candidates.dash.push(v);
            if (/[a-zA-Z\u0600-\u06FF]/.test(v) && v.length > 2 && !/^\d+$/.test(v)) candidates.text.push(v);
        }
        if (candidates.dash.length) res.item_no = candidates.dash[0];
        else if (candidates.long.length) res.item_no = candidates.long[0];
        if (candidates.long.length) {
            for (let n of candidates.long) if (n !== res.item_no) { res.barcode = n; break; }
            if (!res.barcode && candidates.long.length) res.barcode = candidates.long[0];
        }
        if (candidates.text.length) res.name = candidates.text[0];
        return res;
    }
    function parseStockRow(row, blacklist, qtyCol) {
        let d = { item_no: "", name: "", qty: 0 };
        if (qtyCol !== undefined && row[qtyCol] !== undefined) {
            let q = parseFloat(String(row[qtyCol]).replace(/[^\d.-]/g, ''));
            d.qty = isNaN(q) ? 0 : q;
        }
        for (let cell of row) {
            let v = String(cell || '').trim();
            if (!v || blacklist.includes(v)) continue;
            if (/^\d+\.0+$/.test(v)) v = v.replace(/\.0+$/, '');
            if (!d.item_no) {
                let digits = v.replace(/-/g, '');
                if (v.includes('-') && /^\d+$/.test(digits) && digits.length > 10) d.item_no = v;
                else if (/^\d+$/.test(v) && v.length > 6) d.item_no = v;
            }
            if (!d.name && /[a-zA-Z\u0600-\u06FF]/.test(v) && v.length > 2) d.name = v;
        }
        return d;
    }

    let pendingProductFiles = [];
    document.getElementById('dbFileInput').addEventListener('change', (e) => { pendingProductFiles = Array.from(e.target.files); });
    async function processProductFiles(skipBlacklist = false) {
        if (!pendingProductFiles.length) { showToast("اختر ملفات أولاً", true); return; }
        const sourceId = Date.now();
        let totalAdded = 0;
        for (const file of pendingProductFiles) {
            try {
                const rows = await readExcelFile(file);
                if (!rows || rows.length < 2) throw new Error("لا توجد بيانات كافية");
                const blacklist = skipBlacklist ? [] : getCommonBlacklist(rows);
                const dataRows = rows.slice(1);
                const BATCH_SIZE = 150;
                for (let start = 0; start < dataRows.length; start += BATCH_SIZE) {
                    const batch = dataRows.slice(start, Math.min(start + BATCH_SIZE, dataRows.length));
                    const tx = db.transaction(["products"], "readwrite");
                    const store = tx.objectStore("products");
                    for (const row of batch) {
                        let d = parseProductRow(row, blacklist);
                        if (d.item_no || d.barcode) {
                            store.add({ id: generateUniqueId(), barcode: d.barcode || "", item_no: d.item_no || "", name: d.name || "بدون اسم", sourceId });
                            totalAdded++;
                        }
                    }
                    await new Promise((resolve, reject) => { tx.oncomplete = resolve; tx.onerror = () => reject(tx.error); });
                    await new Promise(r => setTimeout(r, 10));
                }
            } catch (err) { showToast(`خطأ في ${file.name}: ${err.message}`, true); return; }
        }
        const ftx = db.transaction("uploadedFiles", "readwrite");
        ftx.objectStore("uploadedFiles").add({ names: pendingProductFiles.map(f => f.name).join(', '), count: totalAdded, sourceId });
        await new Promise(r => { ftx.oncomplete = r; });
        showToast(`✅ تم رفع ${totalAdded} منتج`);
        pendingProductFiles = [];
        updateAllUI();
    }
    document.getElementById('processDbBtn').onclick = () => processProductFiles(false);
    document.getElementById('processDbNoFilterBtn').onclick = () => processProductFiles(true);

    let pendingStockFiles = [];
    document.getElementById('stockFileInput').addEventListener('change', (e) => { pendingStockFiles = Array.from(e.target.files); });
    async function processStockFiles() {
        if (!pendingStockFiles.length) { showToast("اختر ملف المرجع أولاً", true); return; }
        const mode = document.getElementById('stockModeSelect').value;
        if (mode === 'replace') {
            const clearTx = db.transaction("stock", "readwrite");
            clearTx.objectStore("stock").clear();
            await new Promise(r => { clearTx.oncomplete = r; });
        }
        for (const file of pendingStockFiles) {
            const rows = await readExcelFile(file);
            let qtyCol = undefined;
            if (rows[0]) for (let i = 0; i < rows[0].length; i++) if (String(rows[0][i]).trim() === "الفعلي النهائي") qtyCol = i;
            const blacklist = getCommonBlacklist(rows);
            const dataRows = rows.slice(1);
            for (let start = 0; start < dataRows.length; start += 200) {
                const batch = dataRows.slice(start, start + 200);
                const tx = db.transaction("stock", "readwrite");
                const store = tx.objectStore("stock");
                for (const row of batch) {
                    let d = parseStockRow(row, blacklist, qtyCol);
                    if (!d.item_no) continue;
                    if (mode === 'merge') {
                        const existing = await new Promise(r => store.get(d.item_no).onsuccess = e => r(e.target.result));
                        store.put({ key: d.item_no, name: d.name || existing?.name || '', qty: (existing ? existing.qty : 0) + d.qty });
                    } else {
                        store.put({ key: d.item_no, name: d.name, qty: d.qty });
                    }
                }
                await new Promise(r => { tx.oncomplete = r; });
                await new Promise(r => setTimeout(r, 10));
            }
        }
        showToast("تم تحديث المرجع");
        pendingStockFiles = [];
        updateAllUI();
    }
    document.getElementById('processStockBtn').onclick = processStockFiles;

    // تعديل addToInventory لتخزين timestamp
    async function addToInventory(itemCode, productName, barcode = '') {
        return new Promise((resolve) => {
            const tx = db.transaction("inventory", "readwrite");
            const store = tx.objectStore("inventory");
            const key = itemCode;
            const getReq = store.get(key);
            getReq.onsuccess = () => {
                let existing = getReq.result;
                const now = Date.now();
                if (existing) {
                    existing.qty++;
                    existing.timestamp = now; // تحديث الوقت
                    store.put(existing);
                } else {
                    store.put({ key, name: productName, qty: 1, barcode: barcode, item_no: itemCode, timestamp: now });
                }
                tx.oncomplete = () => resolve(true);
                tx.onerror = () => resolve(false);
            };
            getReq.onerror = () => resolve(false);
        });
    }

    // ── منطق المسح المحسّن ──
    async function lookupAndAdd(cleanVal) {
        if (!cleanVal) return;
        const now = Date.now();

        // قفل أثناء المعالجة
        if (isScanLocked) { setScanStatus('locked', 'جاري المعالجة...'); return; }

        // تأخير بين المسحات (قابل للضبط)
        const elapsed = now - lastScanTime;
        if (elapsed < scanDelay) {
            setScanStatus('locked', `انتظر ${((scanDelay - elapsed)/1000).toFixed(1)}s`);
            return;
        }

        isScanLocked = true;
        lastScanTime = now;
        setScanStatus('scanning', `جاري البحث: ${cleanVal}`);

        // تحديث معلومات آخر مسح
        const infoEl = document.getElementById('lastScanInfo');
        if (infoEl) infoEl.textContent = `آخر مسح: ${new Date().toLocaleTimeString('ar-SA')}`;

        try {
            const tx = db.transaction(["products", "stock"], "readonly");
            const products = await new Promise(r => tx.objectStore("products").getAll().onsuccess = e => r(e.target.result));
            let match = products.find(p => p.barcode === cleanVal || p.item_no === cleanVal);
            if (match) {
                await addToInventory(match.item_no || match.barcode, match.name, match.barcode);
                playBeep(true); flashCard('green');
                showToast(`✓ ${match.name}`, false, 1200);
                setScanStatus('ready', `✓ تم جرد: ${match.name}`);
                updateAllUI();
                isScanLocked = false;
                return;
            }
            const stockStore = tx.objectStore("stock");
            const stockItem = await new Promise(r => stockStore.get(cleanVal).onsuccess = e => r(e.target.result));
            if (stockItem) {
                const addTx = db.transaction(["products"], "readwrite");
                addTx.objectStore("products").add({ id: generateUniqueId(), barcode: cleanVal, item_no: stockItem.key, name: stockItem.name, sourceId: "auto" });
                await new Promise(r => { addTx.oncomplete = r; });
                await addToInventory(stockItem.key, stockItem.name, cleanVal);
                playBeep(true); flashCard('green');
                showToast(`✓ إضافة تلقائية: ${stockItem.name}`, false, 1500);
                setScanStatus('ready', `✓ ${stockItem.name}`);
                updateAllUI();
                isScanLocked = false;
                return;
            }
            await addToInventory(cleanVal, "❓ غير معروف", cleanVal);
            playBeep(false); flashCard('red');
            showToast(`⚠️ غير مسجل: ${cleanVal}`, true, 2000);
            setScanStatus('idle', `⚠️ منتج غير معروف`);
            updateAllUI();
        } catch (err) {
            console.error(err);
            setScanStatus('idle', 'خطأ في المعالجة');
        }
        isScanLocked = false;
    }

    document.getElementById('barcodeInput').addEventListener('keydown', async (e) => {
        if (e.key === 'Enter') {
            e.preventDefault();
            let val = document.getElementById('barcodeInput').value.trim();
            if (val) {
                // للمدخلات اليدوية: تجاوز تأخير السكانر
                const savedLast = lastScanTime;
                lastScanTime = 0;
                await lookupAndAdd(val.replace(/\.0+$/, '').trim());
                document.getElementById('barcodeInput').value = '';
            }
        }
    });
    document.getElementById('addOneBtn').onclick = async () => {
        let raw = document.getElementById('barcodeInput').value.trim();
        if (!raw) { showToast("ادخل باركود أو رقم صنف", true); return; }
        lastScanTime = 0; // تجاوز التأخير للإدخال اليدوي
        await lookupAndAdd(raw.replace(/\.0+$/, '').trim());
        document.getElementById('barcodeInput').value = '';
    };
    document.getElementById('resetInventoryBtn').onclick = () => {
        if (confirm("مسح كل الجرد؟")) {
            const tx = db.transaction("inventory", "readwrite"); tx.objectStore("inventory").clear();
            tx.oncomplete = () => { updateAllUI(); showToast("تم مسح الجرد"); };
        }
    };

    // ── كاميرا محسّنة ──
    async function listCameras() {
        try {
            const devices = await Html5Qrcode.getCameras();
            availableCameras = devices;
            const select = document.getElementById('cameraSelect');
            select.innerHTML = '<option value="">اختر الكاميرا</option>';
            devices.forEach((device, idx) => {
                const option = document.createElement('option');
                option.value = device.id;
                option.textContent = device.label || `كاميرا ${idx + 1}`;
                select.appendChild(option);
            });
            if (devices.length > 0) {
                // تفضيل الكاميرا الخلفية
                let selectedCam = devices.find(d =>
                    /back|rear|خلفية|environment/i.test(d.label)
                ) || devices[devices.length - 1]; // آخر كاميرا غالباً هي الخلفية
                currentCameraId = selectedCam.id;
                select.value = currentCameraId;
            }
            // تحديث select عند التغيير
            select.onchange = () => { currentCameraId = select.value; };
        } catch (err) { console.warn(err); }
    }

    async function startCamera(cameraId = null) {
        if (html5QrScanner) { await html5QrScanner.stop().catch(() => {}); html5QrScanner = null; }
        scanningActive = false;
        const cameraDiv = document.getElementById('cameraDiv');
        const scanLine = document.getElementById('scanLine');
        cameraDiv.classList.remove('hidden');
        setScanStatus('scanning', 'جاري تشغيل الكاميرا...');
        try {
            const targetId = cameraId || currentCameraId || (availableCameras[0]?.id);
            if (!targetId) throw new Error("لا توجد كاميرا متاحة");
            html5QrScanner = new Html5Qrcode("reader2");
            await html5QrScanner.start(
                { deviceId: { exact: targetId } },
                {
                    fps: 15,                        // أسرع من 10
                    qrbox: { width: 260, height: 180 },
                    aspectRatio: 1.5,
                    disableFlip: false,
                    formatsToSupport: [
                        Html5QrcodeSupportedFormats?.QR_CODE,
                        Html5QrcodeSupportedFormats?.CODE_128,
                        Html5QrcodeSupportedFormats?.CODE_39,
                        Html5QrcodeSupportedFormats?.EAN_13,
                        Html5QrcodeSupportedFormats?.EAN_8,
                        Html5QrcodeSupportedFormats?.UPC_A,
                    ].filter(Boolean)
                },
                async (decoded) => {
                    let cleanVal = decoded.replace(/\.0+$/, '').trim();
                    document.getElementById('barcodeInput').value = cleanVal;
                    initAudio();
                    await lookupAndAdd(cleanVal);
                    // مسح الحقل بعد تأخير قصير لتفادي تكرار المسح الفوري
                    setTimeout(() => { document.getElementById('barcodeInput').value = ''; }, 300);
                },
                () => {} // خطأ مسح عادي، تجاهل
            );
            scanningActive = true;
            currentCameraId = targetId;
            if (scanLine) scanLine.style.display = 'block';
            setScanStatus('ready', 'الكاميرا نشطة — وجّه الباركود');
            initAudio();
        } catch (err) {
            showToast("خطأ في الكاميرا: " + err.message, true);
            cameraDiv.classList.add('hidden');
            if (scanLine) scanLine.style.display = 'none';
            setScanStatus('idle', 'فشل تشغيل الكاميرا');
            scanningActive = false;
        }
    }

    async function closeCamera() {
        if (html5QrScanner) { await html5QrScanner.stop().catch(() => {}); html5QrScanner = null; }
        scanningActive = false;
        document.getElementById('cameraDiv').classList.add('hidden');
        const scanLine = document.getElementById('scanLine');
        if (scanLine) scanLine.style.display = 'none';
        setScanStatus('idle', 'جاهز للمسح');
    }

    async function switchCamera() {
        if (!availableCameras.length) await listCameras();
        if (availableCameras.length < 2) { showToast("لا توجد كاميرا أخرى متاحة", true); return; }
        const currentIndex = availableCameras.findIndex(c => c.id === currentCameraId);
        const nextIndex = (currentIndex + 1) % availableCameras.length;
        const nextCam = availableCameras[nextIndex];
        document.getElementById('cameraSelect').value = nextCam.id;
        await startCamera(nextCam.id);
    }

    document.getElementById('startCamBtn').onclick = async () => {
        initAudio();
        if (!availableCameras.length) await listCameras();
        const selected = document.getElementById('cameraSelect').value;
        const targetId = selected || currentCameraId || (availableCameras[0]?.id);
        if (targetId) await startCamera(targetId);
        else showToast("لا توجد كاميرا", true);
    };
    document.getElementById('switchCamBtn').onclick = switchCamera;
    document.getElementById('closeCamBtn').onclick = closeCamera;

    // تحديث الواجهة مع ترتيب تنازلي حسب الوقت
    async function updateAllUI() {
        if (!db) return;
        const tx = db.transaction(["inventory", "products", "stock"], "readonly");
        const invRaw = await new Promise(r => tx.objectStore("inventory").getAll().onsuccess = e => r(e.target.result));
        const prods = await new Promise(r => tx.objectStore("products").getAll().onsuccess = e => r(e.target.result));
        const stock = await new Promise(r => tx.objectStore("stock").getAll().onsuccess = e => r(e.target.result));

        // ترتيب تنازلي حسب timestamp (الأحدث أولاً)
        inventory = invRaw.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
        document.getElementById('inventoryCount').innerText = inventory.length;
        document.getElementById('totalProductsStat').innerText = prods.length;
        document.getElementById('totalInventoryStat').innerText = inventory.length;
        document.getElementById('sessionScansStat').innerText = inventory.reduce((s, i) => s + i.qty, 0);

        // عرض قائمة الجرد أسفل الماسح (ترتيب تنازلي بالوقت)
        let invHtml = `<div class="inventory-list">`;
        inventory.forEach(item => {
            let timeStr = item.timestamp ? new Date(item.timestamp).toLocaleTimeString('ar-SA', { hour:'2-digit', minute:'2-digit', second:'2-digit' }) : '';
            invHtml += `<div class="product-card">
                <div class="product-info">
                    <div><strong>${escapeHtml(item.name)}</strong><br><small>رقم: ${escapeHtml(item.item_no || item.key)}</small><div class="product-time">${timeStr}</div></div>
                    <div class="product-quantity">${item.qty}</div>
                </div>
                <div class="product-actions">
                    <button class="icon-btn" onclick="window.updateQuantity('${item.key}', -1)"><i class="fas fa-minus-circle"></i> -1</button>
                    <button class="icon-btn" onclick="window.updateQuantity('${item.key}', 1)"><i class="fas fa-plus-circle"></i> +1</button>
                    <button class="icon-btn" onclick="window.editName('${item.key}')"><i class="fas fa-pen"></i> تعديل</button>
                    <button class="icon-btn" onclick="window.deleteItem('${item.key}')"><i class="fas fa-trash"></i> حذف</button>
                </div></div>`;
        });
        invHtml += `</div>`;
        document.getElementById('inventoryListContainer').innerHTML = invHtml;

        // جداول
        document.getElementById('inventoryFullTable').innerHTML = `<table class="data-table"><thead><th>رقم الصنف</th><th>الاسم</th><th>الكمية</th><th>الوقت</th></thead><tbody>${inventory.map(i => `<tr><td>${escapeHtml(i.key)}</td><td>${escapeHtml(i.name)}</td><td>${i.qty}</td><td>${i.timestamp ? new Date(i.timestamp).toLocaleTimeString('ar-SA') : '-'}</td></tr>`).join('')}</tbody></table>`;
        document.getElementById('stockTableContainer').innerHTML = `<table class="data-table"><thead><th>رقم الصنف</th><th>الاسم</th><th>الكمية المرجعية</th></thead><tbody>${stock.map(s => `<tr><td>${escapeHtml(s.key)}</td><td>${escapeHtml(s.name)}</td><td>${s.qty}</td></tr>`).join('')}</tbody></table>`;

        const allCodes = new Set([...inventory.map(i => i.key), ...stock.map(s => s.key)]);
        let cmpRows = [...allCodes].map(k => {
            let i = inventory.find(x => x.key === k), s = stock.find(x => x.key === k);
            let qi = i ? i.qty : 0, qs = s ? s.qty : 0, diff = qi - qs;
            return { itemNo: (i||s)?.item_no||k, name: (i||s)?.name||'', qs, qi, diff };
        });
        let filter = document.querySelector('.filter-btn.active')?.dataset.filter || 'all';
        let filtered = cmpRows;
        if (filter === 'increase') filtered = filtered.filter(r => r.diff > 0);
        else if (filter === 'decrease') filtered = filtered.filter(r => r.diff < 0);
        else if (filter === 'match') filtered = filtered.filter(r => r.diff === 0);

        document.getElementById('statsActualItems').innerText = stock.length;
        document.getElementById('statsIncreaseCount').innerText = cmpRows.filter(r => r.diff > 0).length;
        document.getElementById('statsDecreaseCount').innerText = cmpRows.filter(r => r.diff < 0).length;
        document.getElementById('statsMatchCount').innerText = cmpRows.filter(r => r.diff === 0).length;
        document.getElementById('statsScannedCount').innerText = inventory.length;
        document.getElementById('statsTotalDiff').innerText = filtered.reduce((a, b) => a + b.diff, 0);

        document.getElementById('comparisonTableDiv').innerHTML = `<table class="data-table"><thead><th>رقم الصنف</th><th>الاسم</th><th>الفعلي</th><th>المجرد</th><th>الفرق</th></thead><tbody>${filtered.map(r => {
            let cls = r.diff > 0 ? 'diff-positive' : (r.diff < 0 ? 'diff-negative' : 'diff-zero');
            let icon = r.diff > 0 ? '⬆️' : (r.diff < 0 ? '⬇️' : '✅');
            return `<tr><td>${escapeHtml(r.itemNo)}</td><td>${escapeHtml(r.name)}</td><td>${r.qs}</td><td>${r.qi}</td><td class="${cls}">${icon} ${r.diff>0?'+':''}${r.diff}</td></tr>`;
        }).join('')}</tbody></table>`;

        document.getElementById('productsTableContainer').innerHTML = `<table class="data-table"><thead><th>رقم الصنف</th><th>الاسم</th><th>الباركود</th><th></th></thead><tbody>${prods.map(p => `<tr><td>${escapeHtml(p.item_no||'-')}</td><td>${escapeHtml(p.name||'-')}</td><td>${escapeHtml(p.barcode||'-')}</td><td><button class="icon-btn" onclick="window.deleteProductById(${p.id})">حذف</button></td></tr>`).join('')}</tbody></table>`;
    }

    // دوال التعديل
    window.updateQuantity = async function(key, delta) {
        const tx = db.transaction("inventory", "readwrite"); const store = tx.objectStore("inventory");
        const item = await new Promise(r => store.get(key).onsuccess = e => r(e.target.result));
        if (item) {
            item.qty = Math.max(0, item.qty + delta);
            item.timestamp = Date.now(); // تحديث الوقت
            store.put(item);
            await new Promise(r => { tx.oncomplete = r; });
            updateAllUI();
        }
    };
    window.editName = async function(key) {
        const tx = db.transaction("inventory", "readwrite"); const store = tx.objectStore("inventory");
        const item = await new Promise(r => store.get(key).onsuccess = e => r(e.target.result));
        if (item) {
            let newName = prompt("الاسم الجديد:", item.name);
            if (newName && newName.trim()) {
                item.name = newName.trim();
                item.timestamp = Date.now(); // تحديث الوقت
                store.put(item);
                await new Promise(r => { tx.oncomplete = r; });
                updateAllUI();
            }
        }
    };
    window.deleteItem = async function(key) {
        if (!confirm("حذف العنصر؟")) return;
        const tx = db.transaction("inventory", "readwrite"); tx.objectStore("inventory").delete(key);
        await new Promise(r => { tx.oncomplete = r; }); updateAllUI();
    };
    window.deleteProductById = async function(id) {
        if (!confirm("حذف المنتج؟")) return;
        const tx = db.transaction("products", "readwrite"); tx.objectStore("products").delete(id);
        await new Promise(r => { tx.oncomplete = r; }); updateAllUI();
    };

    document.querySelectorAll('.filter-btn').forEach(btn => btn.addEventListener('click', function() {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        this.classList.add('active'); updateAllUI();
    }));

    function exportToExcel(data, sheetName, fileName) { const ws = XLSX.utils.json_to_sheet(data); const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, sheetName); XLSX.writeFile(wb, `${fileName}.xlsx`); }
    document.getElementById('exportInventoryBtn').onclick = () => { const tx = db.transaction("inventory", "readonly"); tx.objectStore("inventory").getAll().onsuccess = e => { let inv = e.target.result.sort((a,b)=>(b.timestamp||0)-(a.timestamp||0)); exportToExcel(inv.map(i => ({ "رقم الصنف": i.key, "الاسم": i.name, "الكمية": i.qty, "الوقت": i.timestamp ? new Date(i.timestamp).toLocaleString('ar-SA') : '' })), "الجرد", "جرد_"+Date.now()); }; };
    document.getElementById('exportStockBtn').onclick = () => { const tx = db.transaction("stock", "readonly"); tx.objectStore("stock").getAll().onsuccess = e => { exportToExcel(e.target.result.map(s => ({ "رقم الصنف": s.key, "الاسم": s.name, "الكمية المرجعية": s.qty })), "المرجع", "مرجع_"+Date.now()); }; };
    document.getElementById('exportProductsBtn').onclick = () => { const tx = db.transaction("products", "readonly"); tx.objectStore("products").getAll().onsuccess = e => { exportToExcel(e.target.result.map(p => ({ "رقم الصنف": p.item_no||'', "الاسم": p.name||'', "الباركود": p.barcode||'' })), "المنتجات", "منتجات_"+Date.now()); }; };
    document.getElementById('exportCompareBtn').onclick = () => { const tx = db.transaction(["inventory","stock"], "readonly"); Promise.all([new Promise(r=>tx.objectStore("inventory").getAll().onsuccess=e=>r(e.target.result)), new Promise(r=>tx.objectStore("stock").getAll().onsuccess=e=>r(e.target.result))]).then(([inv,stock])=>{ let allKeys=new Set([...inv.map(i=>i.key),...stock.map(s=>s.key)]); exportToExcel([...allKeys].map(k=>{ let i=inv.find(x=>x.key===k), s=stock.find(x=>x.key===k); return { "رقم الصنف":k, "الاسم":(i||s)?.name||'', "الفعلي":s?s.qty:0, "المجرد":i?i.qty:0, "الفرق":(i?i.qty:0)-(s?s.qty:0) }; }), "المقارنة", "مقارنة_"+Date.now()); }); };

    document.getElementById('globalResetBtn').onclick = () => {
        if (confirm("⚠️ سيتم حذف جميع البيانات نهائياً. متابعة؟")) {
            if (html5QrScanner) { html5QrScanner.stop().catch(() => {}); html5QrScanner = null; }
            if (db) { db.close(); db = null; }
            const deleteRequest = indexedDB.deleteDatabase(DB_NAME);
            deleteRequest.onsuccess = () => window.location.reload();
            deleteRequest.onerror = () => window.location.reload();
            deleteRequest.onblocked = () => window.location.reload();
        }
    };
    document.getElementById('globalManualBtn').onclick = () => document.getElementById('productModal').style.display = 'flex';
    document.getElementById('closeModalBtn').onclick = () => document.getElementById('productModal').style.display = 'none';
    document.getElementById('saveProductBtn').onclick = async () => {
        let itemNo = document.getElementById('modalItemNo').value.trim(), name = document.getElementById('modalName').value.trim(), barcode = document.getElementById('modalBarcode').value.trim(), qty = parseFloat(document.getElementById('modalQty').value)||0;
        if ((!itemNo && !barcode) || !name) { alert("يرجى ملء الحقول الأساسية"); return; }
        const tx = db.transaction(["products","stock"], "readwrite");
        tx.objectStore("products").add({ id: generateUniqueId(), item_no: itemNo, barcode, name, sourceId: "manual" });
        if (qty>0) tx.objectStore("stock").put({ key: itemNo||barcode, name, qty });
        await new Promise(r=>{ tx.oncomplete=r; });
        document.getElementById('productModal').style.display='none';
        updateAllUI(); showToast("تمت الإضافة");
    };
    document.getElementById('stockUploadArea').addEventListener('click',()=>document.getElementById('stockFileInput').click());
    document.getElementById('dbUploadArea').addEventListener('click',()=>document.getElementById('dbFileInput').click());
    document.getElementById('clearProductsBtn').onclick = () => {
        if(confirm("مسح كل المنتجات؟")){
            const tx1=db.transaction("products","readwrite"); tx1.objectStore("products").clear();
            const tx2=db.transaction("uploadedFiles","readwrite"); tx2.objectStore("uploadedFiles").clear();
            Promise.all([new Promise(r=>{ tx1.oncomplete=r; }), new Promise(r=>{ tx2.oncomplete=r; })]).then(()=>{ updateAllUI(); showToast("تم مسح المنتجات"); });
        }
    };
    document.querySelectorAll('.tab-btn').forEach(btn => btn.addEventListener('click', function() {
        let target = this.getAttribute('data-tab');
        document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
        this.classList.add('active');
        document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active-pane'));
        document.getElementById(target).classList.add('active-pane');
        updateAllUI();
    }));

    function initDB() {
        const req = indexedDB.open(DB_NAME, DB_VERSION);
        req.onupgradeneeded = (e) => {
            db = e.target.result;
            if (!db.objectStoreNames.contains("products")) db.createObjectStore("products", { keyPath: "id", autoIncrement: false });
            if (!db.objectStoreNames.contains("inventory")) db.createObjectStore("inventory", { keyPath: "key" });
            if (!db.objectStoreNames.contains("stock")) db.createObjectStore("stock", { keyPath: "key" });
            if (!db.objectStoreNames.contains("uploadedFiles")) db.createObjectStore("uploadedFiles", { keyPath:"id", autoIncrement:true });
        };
        req.onsuccess = (e) => { db = e.target.result; updateAllUI(); listCameras(); };
        req.onerror = (e) => console.error(e);
    }
    initDB();
</script>
</body>
</html>
